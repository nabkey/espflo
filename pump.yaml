# ESPHome configuration for a Pentair SuperFlo VST pool pump.
#
# Hardware:
#   - ESP32-S3 dev board
#   - "TTL485 V2.0" TTL <-> RS-485 module (auto-direction / hardware flow
#     control, so there is NO DE/RE pin to drive)
#   - Custom cable into the pump's COM port; only GREEN (Data+) and
#     YELLOW (Data-) conductors are used.
#
# See README.md for full wiring and protocol notes.

substitutions:
  name: pool-pump
  friendly_name: Pool Pump
  # Pump address as set on the pump keypad: "1" -> 0x60, "2" -> 0x61.
  pump_address: "0x60"
  # Address this controller announces as on the bus.
  controller_address: "0x21"
  # GPIOs wired to the TTL485 module (avoid strapping/USB/flash pins).
  tx_pin: GPIO17
  rx_pin: GPIO18
  # RPM the pump returns to when switched "on" without a speed given.
  default_rpm: "2400"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  # The Pentair RS-485 frame builder is inlined directly in the pentair_apply
  # script below (a plain local lambda), so this config is a single
  # self-contained file with no external header.

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  # No encryption key is set here so this config depends only on the Wi-Fi
  # secrets your ESPHome dashboard already has. To encrypt HA <-> device
  # traffic later, add a key via the dashboard (it stores one per device).

ota:
  - platform: esphome
    # Add `password:` here (or via the dashboard) if you want to lock OTA.

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    # Open fallback hotspot, only active if Wi-Fi fails. Add a `password:`
    # here if you'd rather lock it.
    ssid: "${friendly_name} Fallback"

captive_portal:

# ---------------------------------------------------------------------------
# RS-485 link
# ---------------------------------------------------------------------------
uart:
  id: rs485
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  # Uncomment to dump every byte to the log while troubleshooting wiring:
  # debug:
  #   direction: BOTH
  #   dummy_receiver: false
  #   after:
  #     delimiter: "\n"
  #   sequence:
  #     - lambda: UARTDebug::log_hex(direction, bytes, ' ');

globals:
  - id: target_rpm
    type: int
    restore_value: true
    initial_value: "0"

# ---------------------------------------------------------------------------
# Low-level Pentair commands
# ---------------------------------------------------------------------------
script:
  # Push the full desired state to the pump. Called on every change AND
  # periodically as a keep-alive, because the pump drops out of remote
  # control if it stops hearing from us for ~30 s.
  - id: pentair_apply
    then:
      - lambda: |-
          // Inline Pentair RS-485 frame builder (no external header):
          //   FF 00 FF | A5 00 dst src cmd len data... | ckHi ckLo
          // Checksum = 16-bit sum of A5 .. last data byte, big-endian.
          auto *uart = id(rs485);
          auto send = [uart](uint8_t cmd, const std::vector<uint8_t> &data) {
            std::vector<uint8_t> body = {0xA5, 0x00, ${pump_address},
                                         ${controller_address}, cmd,
                                         (uint8_t) data.size()};
            for (uint8_t b : data) body.push_back(b);
            uint16_t sum = 0;
            for (uint8_t b : body) sum += b;
            std::vector<uint8_t> frame = {0xFF, 0x00, 0xFF};
            for (uint8_t b : body) frame.push_back(b);
            frame.push_back((uint8_t) (sum >> 8));
            frame.push_back((uint8_t) (sum & 0xFF));
            // Use the (ptr, len) overload: the IDFUARTComponent override hides
            // the base class's write_array(std::vector) via C++ name hiding.
            uart->write_array(frame.data(), frame.size());
            uart->flush();
          };
          if (id(target_rpm) > 0) {
            // Take remote control -> set speed -> energize.
            send(0x04, {0xFF});
            delay(50);
            uint16_t r = id(target_rpm);
            send(0x01, {0x02, 0xC4, (uint8_t) (r >> 8), (uint8_t) (r & 0xFF)});
            delay(50);
            send(0x06, {0x0A});
          } else {
            // Power off, then release remote control back to the keypad.
            send(0x06, {0x04});
            delay(50);
            send(0x04, {0x00});
          }

interval:
  # Keep-alive / re-assert state.
  - interval: 15s
    then:
      - script.execute: pentair_apply

# ---------------------------------------------------------------------------
# Home Assistant entities
# ---------------------------------------------------------------------------
number:
  - platform: template
    name: "Pump Speed"
    id: pump_speed
    icon: mdi:speedometer
    unit_of_measurement: RPM
    min_value: 0
    max_value: 3450
    step: 50
    mode: slider
    optimistic: true
    restore_value: true
    set_action:
      - globals.set:
          id: target_rpm
          value: !lambda "return (int) x;"
      - script.execute: pentair_apply

switch:
  - platform: template
    name: "Pump"
    icon: mdi:pump
    lambda: "return id(target_rpm) > 0;"
    turn_on_action:
      - number.set:
          id: pump_speed
          value: ${default_rpm}
    turn_off_action:
      - number.set:
          id: pump_speed
          value: 0

button:
  - platform: template
    name: "Pump Low (1200 RPM)"
    icon: mdi:speedometer-slow
    on_press:
      - number.set: { id: pump_speed, value: 1200 }
  - platform: template
    name: "Pump Medium (2400 RPM)"
    icon: mdi:speedometer-medium
    on_press:
      - number.set: { id: pump_speed, value: 2400 }
  - platform: template
    name: "Pump High (3450 RPM)"
    icon: mdi:speedometer
    on_press:
      - number.set: { id: pump_speed, value: 3450 }
